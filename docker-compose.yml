services:
  api:
    build: .
    restart: always
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AI_INTEGRATIONS_GEMINI_API_KEY=${AI_INTEGRATIONS_GEMINI_API_KEY:-}
      - AI_INTEGRATIONS_GEMINI_BASE_URL=${AI_INTEGRATIONS_GEMINI_BASE_URL:-}
      - DATABASE_URL=${DATABASE_URL:-}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
